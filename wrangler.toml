# Cloudflare Pages configuration
# This file configures the Cloudflare Worker for API proxying
# The static site is deployed via Cloudflare Pages (connected to GitHub)

name = "nickjewell-ai"
compatibility_date = "2024-01-01"

# The Anthropic API key is set as an environment variable
# in the Cloudflare dashboard, NOT in this file.
# Dashboard path: Workers & Pages → nickjewell-ai → Settings → Variables
#
# Variable name: ANTHROPIC_API_KEY
# Value: sk-ant-... (your key)
#
# This keeps the key secure and out of version control.

# D1 Database for storing assessment results
# To set up:
# 1. In Cloudflare Dashboard: Workers & Pages → D1 → Create database → name: "jewell-assessment"
# 2. Copy the database_id and paste it below
# 3. Open the D1 console and run schema.sql to create the table
[[d1_databases]]
binding = "DB"
database_name = "jewell-assessment"
database_id = "REPLACE_WITH_YOUR_DATABASE_ID"
